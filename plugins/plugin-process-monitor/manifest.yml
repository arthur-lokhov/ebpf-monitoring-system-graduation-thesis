name: process-monitor
version: 1.0.0
description: Мониторинг процессов - запуск и завершение
author: epbf-monitoring

ebpf:
  entry: ebpf/main.c
  programs:
    - name: trace_process_exec
      type: tracepoint
      attach: syscalls/sys_enter_execve
    - name: trace_process_exit
      type: tracepoint
      attach: syscalls/sys_enter_kill

events:
  - type: 1
    name: process_start
    metric: process_starts_total
  - type: 2
    name: process_exit
    metric: process_exits_total

metrics:
  - name: process_starts_total
    type: counter
    help: Total number of process starts
    labels: [comm]

  - name: process_exits_total
    type: counter
    help: Total number of process exits
    labels: [comm]

  - name: active_processes
    type: gauge
    help: Current number of active processes
    labels: []

filters:
  - name: processes_per_minute
    expression: per_minute(process_starts_total)

  - name: active_processes_avg
    expression: avg(active_processes)
