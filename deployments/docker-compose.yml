version: "3.8"

services:
  # PostgreSQL for metadata storage
  postgres:
    image: postgres:15-alpine
    container_name: epbf-postgres
    environment:
      POSTGRES_USER: epbf
      POSTGRES_PASSWORD: epbf_password
      POSTGRES_DB: epbf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epbf"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Garage S3-compatible object storage
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: epbf-garage
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - ./garage/data:/garage-data
      - ./garage/config.toml:/etc/garage.toml:ro
    command: ["/garage", "server"]
    healthcheck:
      test: ["CMD", "/garage", "status", "--format", "json"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
