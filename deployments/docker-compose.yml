version: "3.8"

services:
  # Frontend UI (React + Vite)
  ui:
    build:
      context: ..
      dockerfile: deployments/docker/ui.Dockerfile
    container_name: epbf-ui
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://localhost:${MONITOR_PORT:-8080}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - epbf-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: epbf-prometheus
    network_mode: "host"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - epbf-network

  # PostgreSQL for metadata storage
  postgres:
    image: postgres:15-alpine
    container_name: epbf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epbf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epbf_password}
      POSTGRES_DB: ${POSTGRES_DB:-epbf}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-./postgres/data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epbf}"]
      interval: ${POSTGRES_HEALTH_INTERVAL:-5s}
      timeout: ${POSTGRES_HEALTH_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTH_RETRIES:-5}
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - epbf-network

  # Garage S3-compatible object storage
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: epbf-garage
    network_mode: "host"
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - ${GARAGE_DATA_PATH:-./garage/data}:/garage-data
      - ./garage/config.toml:/etc/garage.toml:ro
    environment:
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN:-GKfa5b35bb8a522ebb83c006b8}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY:-921529f4512a60d4f2e947a149f5289fb3ade82c1c10f0761397f80b328d682f}
      - GARAGE_REGION=${GARAGE_REGION:-garage}
    command: ["/garage", "server"]
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: ${GARAGE_HEALTH_INTERVAL:-10s}
      timeout: ${GARAGE_HEALTH_TIMEOUT:-5s}
      retries: ${GARAGE_HEALTH_RETRIES:-3}

  # epbf-monitoring server (run on host for eBPF access)
  # epbf-monitor:
  #   Run locally: go run ./cmd/epbf-monitor
  #   Required env vars: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, S3_ENDPOINT, etc.
  #   See .env.example for full configuration

volumes:
  postgres_data:
  prometheus_data:

networks:
  epbf-network:
    driver: bridge
