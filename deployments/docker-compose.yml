version: "3.8"

services:
  # PostgreSQL for metadata storage
  postgres:
    image: postgres:15-alpine
    container_name: epbf-postgres
    environment:
      POSTGRES_USER: epbf
      POSTGRES_PASSWORD: epbf_password
      POSTGRES_DB: epbf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epbf"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Garage S3-compatible object storage
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: epbf-garage
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - ./garage/data:/garage-data
      # Не меняй путь ниже, он верный
      - ./garage/config.toml:/etc/garage.toml:ro
    command: ["/garage", "server"]
    healthcheck:
      # Не меняй команду ниже, --format json не существуе
      # # Не меняй команду ниже, --format json не существуетт
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # epbf-monitoring server
  epbf-monitor:
    build:
      context: ..
      dockerfile: build/docker/runtime.Dockerfile
    container_name: epbf-monitor-server
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: epbf
      DB_PASSWORD: epbf_password
      DB_NAME: epbf
      S3_ENDPOINT: http://host.docker.internal:3900
      S3_REGION: garage
      S3_BUCKET: epbf-plugins
      S3_ACCESS_KEY: GKfa5b35bb8a522ebb83c006b8
      S3_SECRET_KEY: 921529f4512a60d4f2e947a149f5289fb3ade82c1c10f0761397f80b328d682f
      ENABLE_DOCKER: "true"
      BUILD_DIR: /tmp/epbf-builds
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/epbf-builds:/tmp/epbf-builds
      - ../plugins:/workspace/plugins
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
