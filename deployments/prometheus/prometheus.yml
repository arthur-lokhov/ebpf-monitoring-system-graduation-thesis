global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the eBPF monitoring service metrics
  - job_name: 'epbf-monitor'
    static_configs:
      - targets: ['172.17.0.1:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
